<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamBit - High-Performance Image Processor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header h1 i {
            margin-right: 15px;
        }

        .header .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .header .badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 15px;
            border-radius: 20px;
            margin-top: 10px;
            font-size: 0.9em;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
            transform: scale(1.02);
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8ebff;
        }

        .upload-icon {
            font-size: 4em;
            margin-bottom: 20px;
            color: #667eea;
        }

        .upload-text {
            font-size: 1.3em;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #666;
            font-size: 0.9em;
        }

        #fileInput {
            display: none;
        }

        .file-list {
            margin-top: 30px;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 10px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .file-item:hover {
            background: #f0f2ff;
            transform: translateX(5px);
        }

        .file-icon {
            font-size: 2em;
            margin-right: 15px;
            color: #667eea;
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .file-size {
            color: #666;
            font-size: 0.9em;
        }

        .remove-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .remove-btn:hover {
            background: #ff3838;
            transform: scale(1.05);
        }

        .remove-btn i {
            margin-right: 5px;
        }

        .process-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.3em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .process-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .process-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .process-btn i {
            margin-right: 10px;
        }

        .results {
            display: none;
            margin-top: 30px;
        }

        .results.show {
            display: block;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }

        .success i {
            margin-right: 10px;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }

        .error i {
            margin-right: 10px;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-icon {
            font-size: 2em;
            margin-bottom: 10px;
            opacity: 0.8;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .details-section {
            margin-top: 20px;
        }

        .details-title {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .details-title i {
            margin-right: 10px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .result-label {
            font-weight: bold;
            color: #667eea;
        }

        .result-label i {
            margin-right: 8px;
        }

        .result-value {
            color: #333;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }

        .comparison-section {
            margin-top: 30px;
        }

        .comparison-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }

        .comparison-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .comparison-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .comparison-card.rust {
            border-color: #CE422B;
        }

        .comparison-card.python {
            border-color: #3776AB;
        }

        .comparison-card.speedup {
            border-color: #10b981;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }

        .comparison-header {
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(0, 0, 0, 0.1);
        }

        .comparison-card.rust .comparison-header {
            color: #CE422B;
        }

        .comparison-card.python .comparison-header {
            color: #3776AB;
        }

        .comparison-card.speedup .comparison-header {
            color: white;
            border-bottom-color: rgba(255, 255, 255, 0.3);
        }

        .comparison-header i {
            margin-right: 8px;
        }

        .comparison-stat {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .comparison-stat:last-child {
            border-bottom: none;
        }

        .comparison-stat .stat-label {
            color: #666;
            font-weight: 500;
        }

        .comparison-stat .stat-value {
            font-weight: bold;
            color: #333;
            font-family: 'Courier New', monospace;
        }

        .speedup-value {
            font-size: 3em;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .speedup-label {
            text-align: center;
            font-size: 1.1em;
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-rocket"></i>StreamBit</h1>
            <p class="subtitle">High-Performance Image Processor - Powered by Rust</p>
            <span class="badge">Zero-Copy • Parallel Processing • SIMD Accelerated</span>
        </div>

        <div class="card">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">
                    <i class="fas fa-cloud-upload-alt"></i>
                </div>
                <div class="upload-text">Drag & Drop Images Here or Click to Browse</div>
                <div class="upload-hint">Supports: JPG, PNG, WebP, GIF, BMP</div>
                <input type="file" id="fileInput" multiple accept="image/*">
            </div>

            <div class="file-list" id="fileList"></div>

            <button class="process-btn" id="processBtn" disabled>
                <i class="fas fa-bolt"></i>Process Images
            </button>

            <div class="results" id="results"></div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const processBtn = document.getElementById('processBtn');
        const results = document.getElementById('results');
        let selectedFiles = [];

        // Click to upload
        uploadArea.addEventListener('click', () => fileInput.click());

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        // File input change
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            selectedFiles = Array.from(files);
            displayFiles();
            processBtn.disabled = selectedFiles.length === 0;
        }

        function displayFiles() {
            fileList.innerHTML = '';
            selectedFiles.forEach((file, index) => {
                const fileItem = document.createElement('div');
                fileItem.className = 'file-item';
                fileItem.innerHTML = `
                    <div class="file-icon">
                        <i class="fas fa-file-image"></i>
                    </div>
                    <div class="file-info">
                        <div class="file-name">${file.name}</div>
                        <div class="file-size">${formatFileSize(file.size)}</div>
                    </div>
                    <button class="remove-btn" onclick="removeFile(${index})">
                        <i class="fas fa-trash"></i> Remove
                    </button>
                `;
                fileList.appendChild(fileItem);
            });
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            displayFiles();
            processBtn.disabled = selectedFiles.length === 0;
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

        processBtn.addEventListener('click', async () => {
            if (selectedFiles.length === 0) return;

            processBtn.disabled = true;
            results.innerHTML = '<div class="loading"><div class="spinner"></div><div>Processing images...</div></div>';
            results.classList.add('show');

            const formData = new FormData();
            selectedFiles.forEach(file => {
                formData.append('images', file);
            });

            try {
                const response = await fetch('/process', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    let comparisonHTML = '';
                    if (data.python_time_ms && data.python_throughput) {
                        const speedup = (data.python_time_ms / data.time_ms).toFixed(2);
                        comparisonHTML = `
                            <div class="comparison-section">
                                <h3 class="details-title">
                                    <i class="fas fa-chart-bar"></i>Performance Comparison:
                                </h3>
                                <div class="comparison-grid">
                                    <div class="comparison-card rust">
                                        <div class="comparison-header">
                                            <i class="fab fa-rust"></i> StreamBit (Rust)
                                        </div>
                                        <div class="comparison-stat">
                                            <span class="stat-label">Time:</span>
                                            <span class="stat-value">${data.time_ms.toFixed(2)} ms</span>
                                        </div>
                                        <div class="comparison-stat">
                                            <span class="stat-label">Throughput:</span>
                                            <span class="stat-value">${Math.round(data.throughput)} img/s</span>
                                        </div>
                                    </div>
                                    <div class="comparison-card python">
                                        <div class="comparison-header">
                                            <i class="fab fa-python"></i> Python (Pillow)
                                        </div>
                                        <div class="comparison-stat">
                                            <span class="stat-label">Time:</span>
                                            <span class="stat-value">${data.python_time_ms.toFixed(2)} ms</span>
                                        </div>
                                        <div class="comparison-stat">
                                            <span class="stat-label">Throughput:</span>
                                            <span class="stat-value">${Math.round(data.python_throughput)} img/s</span>
                                        </div>
                                    </div>
                                    <div class="comparison-card speedup">
                                        <div class="comparison-header">
                                            <i class="fas fa-rocket"></i> Speedup
                                        </div>
                                        <div class="speedup-value">${speedup}x</div>
                                        <div class="speedup-label">Faster than Python!</div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }

                    results.innerHTML = `
                        <div class="success">
                            <i class="fas fa-check-circle"></i>${data.message}
                        </div>
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-icon"><i class="fas fa-images"></i></div>
                                <div class="stat-value">${data.images_processed}</div>
                                <div class="stat-label">Images Processed</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-icon"><i class="fas fa-clock"></i></div>
                                <div class="stat-value">${data.time_ms.toFixed(2)}</div>
                                <div class="stat-label">Time (ms)</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-icon"><i class="fas fa-tachometer-alt"></i></div>
                                <div class="stat-value">${Math.round(data.throughput)}</div>
                                <div class="stat-label">Images/Second</div>
                            </div>
                        </div>
                        ${comparisonHTML}
                        <div class="details-section">
                            <h3 class="details-title">
                                <i class="fas fa-info-circle"></i>Processing Details:
                            </h3>
                            ${data.shapes.map((shape, i) => `
                                <div class="result-item">
                                    <span class="result-label">
                                        <i class="fas fa-image"></i>Image ${i + 1}
                                    </span>
                                    <span class="result-value">Shape: [${shape.join(', ')}]</span>
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else {
                    results.innerHTML = `
                        <div class="error">
                            <i class="fas fa-exclamation-circle"></i>${data.message}
                        </div>
                    `;
                }
            } catch (error) {
                results.innerHTML = `
                    <div class="error">
                        <i class="fas fa-exclamation-triangle"></i>Connection error: ${error.message}
                    </div>
                `;
            } finally {
                processBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
